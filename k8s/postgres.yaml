apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: labotrack
type: Opaque
stringData:
  POSTGRES_USER: labotrack
  POSTGRES_PASSWORD: labotrack
  POSTGRES_DB: labotrack
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: labotrack
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: labotrack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "labotrack", "-d", "labotrack"]
            initialDelaySeconds: 5
            periodSeconds: 5
