apiVersion: v1
kind: Service
metadata:
  name: result-frontend
  namespace: labotrack
spec:
  type: NodePort
  selector:
    app: result-frontend
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: result-frontend
  namespace: labotrack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: result-frontend
  template:
    metadata:
      labels:
        app: result-frontend
    spec:
      containers:
        - name: result-frontend
          image: labotrack/result-frontend:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SAMPLE_API_URL
              value: http://sample-api:8081
            - name: ANALYSIS_API_URL
              value: http://analysis-api:8082
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
